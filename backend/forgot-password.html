<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Twende Tours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .reset-container { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 450px; width: 100%; padding: 40px; }
        .reset-header { text-align: center; margin-bottom: 30px; }
        .reset-header h1 { color: #1a365d; font-size: 28px; margin-bottom: 10px; }
        .reset-header p { color: #718096; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; color: #2d3748; margin-bottom: 8px; font-size: 14px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; transition: border-color 0.3s; font-family: inherit; }
        .form-control:focus { outline: none; border-color: #2c5282; box-shadow: 0 0 0 3px rgba(44, 82, 130, 0.1); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-size: 14px; }
        .btn-primary { background: linear-gradient(135deg, #2c5282 0%, #1a365d 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(44, 82, 130, 0.3); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-message { color: #e53e3e; background: #fed7d7; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; display: none; }
        .success-message { color: #22543d; background: #c6f6d5; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; display: none; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #2c5282; text-decoration: none; font-size: 13px; font-weight: 500; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <h1>🔐 Reset Password</h1>
            <p>Enter your email to receive a reset link</p>
        </div>

        <form id="resetForm" onsubmit="handlePasswordReset(event)">
            <div class="error-message" id="resetError"></div>
            <div class="success-message" id="resetSuccess"></div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="resetEmail" class="form-control" placeholder="you@example.com" required>
            </div>
            
            <button type="submit" class="btn btn-primary" id="resetBtn">Send Reset Link</button>
        </form>

        <div class="back-link">
            <a href="index.html">← Back to Login</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://twende-tours-production.up.railway.app';

        async function handlePasswordReset(e) {
            e.preventDefault();
            
            const email = document.getElementById('resetEmail').value;
            const btn = document.getElementById('resetBtn');
            const errorDiv = document.getElementById('resetError');
            const successDiv = document.getElementById('resetSuccess');
            
            btn.disabled = true;
            btn.textContent = 'Sending...';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    successDiv.textContent = 'Reset link sent to your email. Please check your inbox.';
                    successDiv.style.display = 'block';
                    document.getElementById('resetForm').reset();
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                } else {
                    errorDiv.textContent = result.message || 'Failed to send reset link';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Password reset error:', error);
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        }
    </script>
</body>
</html>
