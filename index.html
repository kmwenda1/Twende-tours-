<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twende Tours - Safari Adventures</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-container { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 450px; width: 100%; padding: 40px; }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h1 { color: #1a365d; font-size: 28px; margin-bottom: 10px; }
        .auth-header p { color: #718096; font-size: 14px; }
        .tabs { display: flex; gap: 0; border-bottom: 2px solid #e2e8f0; margin-bottom: 30px; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #718096; font-weight: 500; border-bottom: 3px solid transparent; transition: all 0.3s; }
        .tab.active { color: #2c5282; border-bottom-color: #2c5282; }
        .tab:hover { color: #2c5282; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; color: #2d3748; margin-bottom: 8px; font-size: 14px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; transition: border-color 0.3s; font-family: inherit; }
        .form-control:focus { outline: none; border-color: #2c5282; box-shadow: 0 0 0 3px rgba(44, 82, 130, 0.1); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-size: 14px; }
        .btn-primary { background: linear-gradient(135deg, #2c5282 0%, #1a365d 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(44, 82, 130, 0.3); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-message { color: #e53e3e; background: #fed7d7; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; display: none; }
        .success-message { color: #22543d; background: #c6f6d5; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; display: none; }
        .forgot-password { text-align: center; margin-top: 15px; }
        .forgot-password a { color: #2c5282; text-decoration: none; font-size: 13px; font-weight: 500; }
        .forgot-password a:hover { text-decoration: underline; }
        .auth-footer { text-align: center; margin-top: 25px; font-size: 12px; color: #718096; }
        .auth-footer a { color: #2c5282; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        .role-select-info { background: #edf2f7; padding: 10px; border-radius: 6px; font-size: 12px; color: #4a5568; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>🦁 Twende Tours</h1>
            <p>Your Gateway to African Safaris</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
            <div class="error-message" id="loginError"></div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
            <div class="forgot-password">
                <a href="forgot-password.html">Forgot Password?</a>
            </div>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
            <div class="error-message" id="registerError"></div>
            <div class="success-message" id="registerSuccess"></div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="registerName" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="registerEmail" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="registerPassword" class="form-control" placeholder="••••••••" minlength="6" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="registerPhone" class="form-control" placeholder="+254700000000">
            </div>
            <div class="form-group">
                <label>Account Type</label>
                <select id="registerRole" class="form-control" required>
                    <option value="client" selected>Client (Access Tours)</option>
                    <option value="staff">Staff Member (Needs Approval)</option>
                    <option value="manager">Manager (Needs Approval)</option>
                </select>
                <div class="role-select-info">
                    <strong>ℹ️ Note:</strong> Staff & Managers require admin approval before accessing the portal.
                </div>
            </div>
            <div class="form-group">
                <label>Interested In</label>
                <select id="registerInterest" class="form-control">
                    <option value="">Select...</option>
                    <option value="Safari">Safari</option>
                    <option value="Beach">Beach</option>
                    <option value="Cultural">Cultural Tour</option>
                    <option value="Adventure">Adventure</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" id="registerBtn">Create Account</button>
        </form>

        <div class="auth-footer">
            <p>By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></p>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://twende-tours-production.up.railway.app';
        
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.getElementById('registerForm').classList.add('active');
            }
            
            document.querySelectorAll('.error-message, .success-message').forEach(el => {
                el.style.display = 'none';
                el.textContent = '';
            });
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');
            
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    sessionStorage.setItem('twende_user', JSON.stringify(result.user));
                    
                    if (result.role === 'admin' || result.role === 'staff') {
                        window.location.href = 'staff.html';
                    } else {
                        window.location.href = 'client.html';
                    }
                } else {
                    errorDiv.textContent = result.message || 'Invalid credentials';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = 'Connection error. Please check your internet.';
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const phone = document.getElementById('registerPhone').value;
            const interest = document.getElementById('registerInterest').value;
            const role = document.getElementById('registerRole').value;
            
            const btn = document.getElementById('registerBtn');
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, phone, interest, role })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    successDiv.textContent = 'Account created! Please login.';
                    successDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        document.querySelectorAll('.tab')[0].click();
                        document.getElementById('loginEmail').value = email;
                    }, 2000);
                } else {
                    errorDiv.textContent = result.message || 'Registration failed';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Register error:', error);
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const user = sessionStorage.getItem('twende_user');
            if (user) {
                const userData = JSON.parse(user);
                if (userData.role === 'admin' || userData.role === 'staff' || userData.role === 'manager') {
                    window.location.href = 'staff.html';
                } else {
                    window.location.href = 'client.html';
                }
            }
        });
    </script>
</body>
</html>
