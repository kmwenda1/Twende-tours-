<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twende Tours - Safari Adventures</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-container { background: white; border-radius: 20px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .auth-header { text-align: center; margin-bottom: 32px; }
        .auth-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px; }
        .auth-logo i { color: #d97706; }
        .auth-logo span { font-size: 1.5rem; font-weight: 700; color: #1a365d; }
        .auth-title { font-size: 1.75rem; font-weight: 700; color: #1a365d; margin-bottom: 8px; }
        .auth-subtitle { color: #64748b; font-size: 0.95rem; }
        .auth-form { display: flex; flex-direction: column; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-weight: 500; color: #334155; font-size: 0.9rem; }
        .form-control { padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; transition: border-color 0.2s; }
        .form-control:focus { outline: none; border-color: #3b82f6; }
        .btn { padding: 14px; border: none; border-radius: 10px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #1a365d; color: white; }
        .btn-primary:hover { background: #1e40af; transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .auth-footer { text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #e2e8f0; }
        .auth-footer a { color: #3b82f6; text-decoration: none; font-weight: 500; }
        .auth-footer a:hover { text-decoration: underline; }
        .error-message { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; font-size: 0.9rem; display: none; }
        .success-message { background: #d1fae5; color: #065f46; padding: 12px; border-radius: 8px; font-size: 0.9rem; display: none; }
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .tab { flex: 1; padding: 12px; text-align: center; border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .tab.active { background: #1a365d; color: white; border-color: #1a365d; }
        .tab:hover:not(.active) { border-color: #3b82f6; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                <i data-lucide="compass" width="32" height="32"></i>
                <span>Twende Tours</span>
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to manage your safari adventures</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
            <div class="error-message" id="loginError"></div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)">
            <div class="error-message" id="registerError"></div>
            <div class="success-message" id="registerSuccess"></div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="registerName" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="registerEmail" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="registerPassword" class="form-control" placeholder="••••••••" minlength="6" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="registerPhone" class="form-control" placeholder="+254700000000">
            </div>
            <div class="form-group">
                <label>Interested In</label>
                <select id="registerInterest" class="form-control">
                    <option value="">Select...</option>
                    <option value="Safari">Safari</option>
                    <option value="Beach">Beach</option>
                    <option value="Cultural">Cultural Tour</option>
                    <option value="Adventure">Adventure</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" id="registerBtn">Create Account</button>
        </form>

        <div class="auth-footer">
            <p>By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></p>
        </div>
    </div>

    <script>
        // 🔥 RAILWAY BACKEND URL - UPDATE THIS TO YOUR ACTUAL RAILWAY URL 🔥
        const API_BASE_URL = 'https://twende-tours-production.up.railway.app';
        
        // Initialize icons
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
            
            // Clear messages
            document.querySelectorAll('.error-message, .success-message').forEach(el => {
                el.style.display = 'none';
                el.textContent = '';
            });
        }

        // Login handler - Points to Railway backend
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');
            
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errorDiv.style.display = 'none';
            
            try {
                // 🔥 API call to Railway backend 🔥
                const response = await fetch(`${API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Save user to session
                    sessionStorage.setItem('twende_user', JSON.stringify(result.user));
                    
                    // Redirect based on role
                    if (result.role === 'admin' || result.role === 'staff') {
                        window.location.href = 'staff.html';
                    } else {
                        window.location.href = 'client.html';
                    }
                } else {
                    errorDiv.textContent = result.message || 'Invalid credentials';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = 'Connection error. Please check your internet.';
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        // Register handler - Points to Railway backend
        async function handleRegister(e) {
            e.preventDefault();
            
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const phone = document.getElementById('registerPhone').value;
            const interest = document.getElementById('registerInterest').value;
            
            const btn = document.getElementById('registerBtn');
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            try {
                // 🔥 API call to Railway backend 🔥
                const response = await fetch(`${API_BASE_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, phone, interest })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    successDiv.textContent = 'Account created! Please login.';
                    successDiv.style.display = 'block';
                    
                    // Switch to login tab after 2 seconds
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('loginEmail').value = email;
                    }, 2000);
                } else {
                    errorDiv.textContent = result.message || 'Registration failed';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Register error:', error);
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const user = sessionStorage.getItem('twende_user');
            if (user) {
                const userData = JSON.parse(user);
                if (userData.role === 'admin' || userData.role === 'staff') {
                    window.location.href = 'staff.html';
                } else {
                    window.location.href = 'client.html';
                }
            }
        });
    </script>
</body>
</html>
