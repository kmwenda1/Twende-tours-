<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | Twende Tours</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="client-styles.css">
</head>

<body>

<!-- HEADER -->
<header class="portal-header">
    <div class="portal-logo">
        <i data-lucide="compass"></i> Twende Tours
    </div>

    <nav class="portal-nav">
        <a onclick="showSection('dashboard')" class="nav-link active">Dashboard</a>
        <a onclick="showSection('myTrips')" class="nav-link">My Trips</a>
        <a onclick="showSection('fleet')" class="nav-link">Fleet</a>
        <a onclick="showSection('profile')" class="nav-link">Profile</a>
        <a onclick="handleLogout()" class="logout-btn">Logout</a>
    </nav>
</header>

<!-- MAIN -->
<main class="portal-main">

<!-- DASHBOARD -->
<section id="dashboardSection" class="portal-section">
    <h1>Welcome, <span id="dashUserName"></span></h1>

    <div class="stats-grid">
        <div>Total Trips: <span id="statTotalTrips">0</span></div>
        <div>Upcoming: <span id="statUpcoming">0</span></div>
        <div>Completed: <span id="statCompleted">0</span></div>
        <div>Total Spent: <span id="statTotalSpent">$0</span></div>
    </div>

    <button onclick="openRequestModal()">Request Safari</button>
</section>

<!-- MY TRIPS -->
<section id="myTripsSection" class="portal-section hidden-section">
    <h1>My Trips</h1>

    <table>
        <thead>
            <tr>
                <th>Destination</th>
                <th>Vehicle</th>
                <th>Dates</th>
                <th>Travelers</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tripHistoryBody"></tbody>
    </table>
</section>

<!-- FLEET -->
<section id="fleetSection" class="portal-section hidden-section">
    <h1>Fleet</h1>

    <div>
        <button onclick="filterFleet('all')">All</button>
        <button onclick="filterFleet('Available')">Available</button>
    </div>

    <div id="fleetGrid"></div>
</section>

<!-- PROFILE -->
<section id="profileSection" class="portal-section hidden-section">
    <h1>Profile</h1>

    <p>Name: <span id="profileName"></span></p>
    <p>Email: <span id="profileEmail"></span></p>
</section>

</main>

<!-- MODAL -->
<div id="requestModal" class="modal-portal">
    <div class="modal-portal-content">

        <h2>Book Safari</h2>

        <form id="bookingForm" onsubmit="submitSafariRequest(event)">
            <input type="text" id="reqDestination" placeholder="Destination" required>
            <input type="date" id="reqDate" required>
            <input type="number" id="reqTravelers" placeholder="Travelers" required>
            <textarea id="reqNotes"></textarea>

            <button type="submit" id="submitBookingBtn">Submit</button>
        </form>

        <!-- PAYMENT -->
        <div id="paymentSection" style="display:none;">
            <h3>M-Pesa Payment</h3>

            <input id="mpesaPhone" placeholder="2547XXXXXXXX">
            <button onclick="handleMpesaPaymentSubmit()">Pay</button>

            <div id="paymentStatus"></div>
        </div>

        <button onclick="closeRequestModal()">Close</button>
    </div>
</div>

<!-- SCRIPTS -->
<script src="backend.js"></script>
<script src="client.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    if (typeof lucide !== "undefined") {
        lucide.createIcons();
    }
});
</script>

</body>
</html>
